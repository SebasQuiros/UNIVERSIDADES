<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle background - blue gradient -->
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4DA8DA"/>
      <stop offset="50%" stop-color="#2176AE"/>
      <stop offset="100%" stop-color="#0D4F8B"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <!-- Main circle -->
  <circle cx="100" cy="100" r="97" fill="#0D4F8B"/>
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- Shine overlay -->
  <circle cx="100" cy="100" r="95" fill="url(#shineGrad)"/>

  <!-- Bar chart bars (green shades, clipped inside circle) -->
  <g clip-path="url(#circleClip)">
    <!-- Bar 1 (tallest, leftmost) -->
    <rect x="30" y="68" width="22" height="70" rx="3" fill="#2ECC71"/>
    <!-- Bar 2 -->
    <rect x="58" y="82" width="22" height="56" rx="3" fill="#27AE60"/>
    <!-- Bar 3 -->
    <rect x="86" y="55" width="22" height="83" rx="3" fill="#2ECC71"/>
    <!-- Bar 4 (shortest) -->
    <rect x="114" y="95" width="22" height="43" rx="3" fill="#27AE60"/>
    <!-- Bar 5 -->
    <rect x="142" y="70" width="22" height="68" rx="3" fill="#2ECC71"/>

    <!-- Trend line going up -->
    <polyline
      points="41,90 69,80 97,62 125,105 153,72"
      fill="none"
      stroke="white"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"
    />
    <!-- Dots on trend line -->
    <circle cx="41"  cy="90"  r="4.5" fill="white" opacity="0.9"/>
    <circle cx="69"  cy="80"  r="4.5" fill="white" opacity="0.9"/>
    <circle cx="97"  cy="62"  r="4.5" fill="white" opacity="0.9"/>
    <circle cx="125" cy="105" r="4.5" fill="white" opacity="0.9"/>
    <circle cx="153" cy="72"  r="5.5" fill="white"/>

    <!-- White base line -->
    <rect x="20" y="138" width="160" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Border ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
</svg>
