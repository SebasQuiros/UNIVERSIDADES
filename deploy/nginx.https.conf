# ================================================================
#  CONTAFÁCIL SQ — Nginx con HTTPS (Let's Encrypt / Certbot)
#
#  INSTRUCCIONES:
#  1. Instala certbot:  apt install certbot python3-certbot-nginx
#  2. Obtén certificado: certbot --nginx -d tudominio.cr -d www.tudominio.cr
#  3. Reemplaza "tudominio.cr" con tu dominio real en este archivo
#  4. Copia a deploy/nginx.conf y reinicia nginx
# ================================================================

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream backend {
    server backend:3001;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name tudominio.cr www.tudominio.cr;

    # Allow certbot ACME challenge (Let's Encrypt renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name tudominio.cr www.tudominio.cr;

    # ── SSL certificates (generados por certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.cr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.cr/privkey.pem;

    # ── SSL hardening ──────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_stapling               on;
    ssl_stapling_verify        on;

    # ── Security headers ───────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://tudominio.cr" always;

    # ── Gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               image/svg+xml font/woff font/woff2;

    # ── Connection limits ──────────────────────────────────────────
    limit_conn perip 50;
    client_max_body_size 20M;
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── Auth endpoints — rate limit estricto ──────────────────────
    location ~ ^/api/v1/auth/(login|refresh|register) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ── API general ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout    60s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;
    }

    # ── Next.js static assets — caché agresivo ────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Archivos públicos ─────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Frontend ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout    60s;
        proxy_connect_timeout  5s;
    }
}
